<!DOCTYPE html>
<html>
<body>
<script>
const duplicar = (arr) => arr.map(num => num * 2);

const cantidad = parseInt(prompt("Cantidad de números:"));
let numeros = [];

for (let i = 0; i < cantidad; i++) {
    numeros.push(parseInt(prompt("Ingrese número:")));
}

const resultado = duplicar(numeros);

document.write(`Resultado: ${resultado}`);
</script>
</body>
</html>
