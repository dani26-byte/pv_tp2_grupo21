<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18</title>
</head>
<body>
    <script>
        const numero1 = parseInt(prompt("Ingrese el primer numero:"));
        const numero2 = parseInt(prompt("Ingrese el segundo numero:"));
        const calcularMayor = (numero1, numero2) => {
            let resultado = "";
            if (numero1 > numero2) {
                resultado = `El numero mayor es: ${numero1}`;
            } else if (numero2 > numero1) {
                resultado = `El numero mayor es: ${numero2}`;
            } else {
                resultado = "Ambos numeros son iguales.";
            }
            return resultado;   
        }
        document.write(`Los numeros ingresados son: ${numero1}, ${numero2} <br>`);
        document.write(calcularMayor(numero1, numero2));
    </script>
</body>
</html>
